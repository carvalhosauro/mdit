# git-cliff config — drives version bump + release notes for the release train.
# Version comes from conventional commits (feat->minor, fix->patch,
# BREAKING/!->major). Merge commits and non-conventional commits are dropped.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^Merge", skip = true },
  { message = "^chore", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI/CD" },
  { message = "^build", group = "Build" },
  { message = ".*", group = "Other" },
]

[bump]
features_always_bump_minor = true
breaking_always_bump_major = true
